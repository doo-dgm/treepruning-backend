# ---------------------------------------------------------------------------
# Perfil: openapi-gen
# Uso exclusivo del springdoc-openapi-maven-plugin durante el CI.
# Arranca Spring Boot con dependencias externas minimas para exponer
# /v3/api-docs. PostgreSQL y Redis se levantan como service containers en GHA.
# NO usar en dev ni prod.
# ---------------------------------------------------------------------------

# Entorno — activa el permitAll en SecurityConfig para /v3/api-docs
app.environment=openapi-gen

# JPA: no validar ni crear tablas (el schema puede no existir en el container CI)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.default_schema=public

server.port=8080

# Kafka: deshabilitado — no necesario para generar el spec
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Strapi: endpoint dummy — MessageCatalogService es lazy y tiene fallback
strapi.url=http://localhost:19337
strapi.token=dummy-token

# MinIO: endpoint dummy — el cliente S3 no se inicializa hasta el primer uso
storage.minio.endpoint=http://localhost:19000
storage.minio.public-endpoint=http://localhost:19000
storage.minio.bucket=openapi-gen
storage.minio.access-key=minioadmin
storage.minio.secret-key=minioadmin123

# Keycloak: URL dummy — JwtDecoder es lazy, no bloquea el arranque
kc.issuer-uri=http://localhost:19080/realms/tree-pruning
kc.client-id=tree-pruning-frontend

# Firebase: deshabilitado — credenciales vacias = FCM deshabilitado silenciosamente
firebase.credentials-json=
firebase.credentials-path=

# reCAPTCHA: valor dummy
recaptcha.secret-key=dummy-recaptcha-key-openapi-gen
