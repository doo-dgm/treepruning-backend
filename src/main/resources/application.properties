spring.application.name=tree-pruning

# ─── PostgreSQL ───────────────────────────────────────────────────────────────
# Local: usa los defaults (:valor). Desplegado: Infisical inyecta las variables.
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB:postgres}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:1023}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}
spring.jpa.properties.hibernate.default_schema=${JPA_SCHEMA:treepruning}
spring.jpa.open-in-view=false

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}
