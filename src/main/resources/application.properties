spring.application.name=tree-pruning

# ----- PostgreSQL (principal) -----
# El DataSourceFallbackPostProcessor prueba esta conexión al arrancar.
# Si no está disponible, sobreescribe automáticamente con MySQL.
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:treepruning}
spring.datasource.username=${POSTGRES_USER:}
spring.datasource.password=${POSTGRES_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ----- MySQL (fallback automático) -----
# El fallback se activa si PostgreSQL no responde al inicio.
# Variables leídas por DataSourceFallbackPostProcessor:
#   MYSQL_HOST (def: localhost), MYSQL_PORT (def: 3306), MYSQL_DB, MYSQL_USER, MYSQL_PASSWORD

# ----- JPA / Hibernate -----
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO}
spring.jpa.show-sql=${JPA_SHOW_SQL}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL}
spring.jpa.properties.hibernate.default_schema=${JPA_SCHEMA}
spring.jpa.open-in-view=false

# ----- Server -----
server.port=${SERVER_PORT}

# ----- Actuator (health, metrics, prometheus) -----
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=tree-pruning
management.metrics.tags.environment=${APP_ENVIRONMENT:local}
info.app.name=TreePruning
info.app.version=1.0.0

# ----- MinIO / Object Storage -----
storage.minio.endpoint=${STORAGE_MINIO_ENDPOINT}
storage.minio.public-endpoint=${STORAGE_MINIO_PUBLIC_ENDPOINT}
storage.minio.bucket=${STORAGE_MINIO_BUCKET}
storage.minio.access-key=${STORAGE_MINIO_ACCESS_KEY}
storage.minio.secret-key=${STORAGE_MINIO_SECRET_KEY}
storage.minio.presigned-url-expiry-seconds=${STORAGE_MINIO_PRESIGNED_EXPIRY:900}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# ----- Springdoc / Swagger -----
# Cloudflare WAF bloquea el path canonico /v3/api-docs (y su /swagger-config)
# por considerarlo reconnaissance. Movemos el path raiz bajo /api/v1/openapi:
# springdoc reubica automaticamente todos sus sub-recursos (swagger-config,
# yaml, etc.). La UI sigue en /swagger-ui.html con su redirect default.
springdoc.api-docs.path=/api/v1/openapi

# Que Spring respete X-Forwarded-Proto/Host enviados por Kong y Traefik
# al generar URLs en el OpenAPI spec. Sin esto, springdoc emite el server
# URL como http://tp-backend-dev:8080 (hostname interno) y Swagger UI falla
# con NetworkError porque ese hostname no se resuelve en el navegador.
server.forward-headers-strategy=framework

# ----- Strapi (catalogo de mensajes i18n) -----
strapi.url=${STRAPI_URL}
strapi.token=${STRAPI_API_TOKEN}

# ----- Cache (Redis) -- todos los caches: mensajes i18n + catalogos CDC;Redis -- cache distribuida -----

spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.database=${REDIS_DATABASE:0}

# Kafka -- CDC cache invalidation
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:tp-redpanda:29092}

# ----- Keycloak / OAuth2 Resource Server -----
kc.issuer-uri=${KEYCLOAK_ISSUER_URI}
kc.client-id=${VITE_KEYCLOAK_CLIENT}

recaptcha.secret-key=${RECAPTCHA_SECRET_KEY}

# ----- Firebase / FCM -----
firebase.credentials-json=${FIREBASE_CREDENTIALS_JSON:}
firebase.credentials-path=${FIREBASE_CREDENTIALS_PATH:}


