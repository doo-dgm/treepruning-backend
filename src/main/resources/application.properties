spring.application.name=tree-pruning

# ─── PostgreSQL ───────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── Spring Cloud Config (Parameter Catalog) ─────────────────────────────────
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
spring.cloud.config.fail-fast=true

# ─── Strapi (Notification / Message Catalog) ──────────────────────────────────
strapi.base-url=${STRAPI_BASE_URL}
strapi.api-token=${STRAPI_API_TOKEN}

# ─── Infisical (Key Vault) ────────────────────────────────────────────────────
infisical.base-url=${INFISICAL_BASE_URL}
infisical.client-id=${INFISICAL_CLIENT_ID}
infisical.client-secret=${INFISICAL_CLIENT_SECRET}
infisical.project-id=${INFISICAL_PROJECT_ID}
infisical.environment=${INFISICAL_ENVIRONMENT:dev}

# ─── Keycloak (Identity Provider / JWT Resource Server) ──────────────────────
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWKS_URI}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI}

# ─── Actuator (health check + métricas para Kong/Prometheus) ─────────────────
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# ─── Loki (logs estructurados) ────────────────────────────────────────────────
loki.url=${LOKI_URL:http://localhost:3100}
