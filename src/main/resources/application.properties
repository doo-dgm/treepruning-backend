spring.application.name=tree-pruning

# ----- PostgreSQL (principal) -----
# El DataSourceFallbackPostProcessor prueba esta conexión al arrancar.
# Si no está disponible, sobreescribe automáticamente con MySQL.
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:treepruning}
spring.datasource.username=${POSTGRES_USER:}
spring.datasource.password=${POSTGRES_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# ----- MySQL (fallback automático) -----
# El fallback se activa si PostgreSQL no responde al inicio.
# Variables leídas por DataSourceFallbackPostProcessor:
#   MYSQL_HOST (def: localhost), MYSQL_PORT (def: 3306), MYSQL_DB,
#   MYSQL_USER, MYSQL_PASSWORD

# ----- JPA / Hibernate -----
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO}
spring.jpa.show-sql=${JPA_SHOW_SQL}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL}
spring.jpa.properties.hibernate.default_schema=${JPA_SCHEMA}
spring.jpa.open-in-view=false

# ----- Server -----
server.port=${SERVER_PORT}

# ----- Actuator (health, metrics, prometheus) -----
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=tree-pruning
management.metrics.tags.environment=${APP_ENVIRONMENT:local}
info.app.name=TreePruning
info.app.version=1.0.0

# ─── MinIO / Object Storage ──────────────────────────────────────────────────
storage.minio.endpoint=${STORAGE_MINIO_ENDPOINT}
storage.minio.public-endpoint=${STORAGE_MINIO_PUBLIC_ENDPOINT}
storage.minio.bucket=${STORAGE_MINIO_BUCKET}
storage.minio.access-key=${STORAGE_MINIO_ACCESS_KEY}
storage.minio.secret-key=${STORAGE_MINIO_SECRET_KEY}
storage.minio.presigned-url-expiry-seconds=${STORAGE_MINIO_PRESIGNED_EXPIRY:900}

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# ----- Strapi (catalogo de mensajes i18n) -----
strapi.url=${STRAPI_URL}
strapi.token=${STRAPI_API_TOKEN}

# ----- Cache (Caffeine) — catalogo de mensajes i18n -----
# Caffeine se mantiene para el catalogo: es in-process (50ns) y el
# catalogo de ~70 strings no necesita distribucion. Redis queda para
# rate limiting, idempotency keys y locks distribuidos.
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=5m
spring.cache.cache-names=messages

# ----- Redis — cache distribuida -----
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.database=${REDIS_DATABASE:0}

# Kafka -- CDC cache invalidation
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:tp-redpanda:29092}

# ----- Keycloak / OAuth2 Resource Server -----
# KEYCLOAK_ISSUER_URI ejemplo: https://auth.treepruning.org/realms/tree-pruning
# El JWK set URI se deriva automaticamente: {issuer}/protocol/openid-connect/certs
# Se carga de forma lazy (no bloquea el arranque si Keycloak esta lento).
kc.issuer-uri=${KEYCLOAK_ISSUER_URI}
kc.client-id=${VITE_KEYCLOAK_CLIENT}

recaptcha.secret-key=${RECAPTCHA_SECRET_KEY}

# ----- Firebase / FCM -----
# Opción 1 (Docker/CI): pasar el JSON completo del service-account como variable de entorno.
#   FIREBASE_CREDENTIALS_JSON='{ "type": "service_account", ... }'
# Opción 2 (local): ruta a un archivo JSON en disco.
#   FIREBASE_CREDENTIALS_PATH=/ruta/al/serviceAccount.json
# Si ninguna está definida, FCM queda deshabilitado silenciosamente.
firebase.credentials-json=${FIREBASE_CREDENTIALS_JSON:}
firebase.credentials-path=${FIREBASE_CREDENTIALS_PATH:}
