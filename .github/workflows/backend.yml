name: Backend CI/CD
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/tree-pruning-backend
jobs:
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:${{ github.ref == 'refs/heads/main' && 'latest' || 'dev' }}
          provenance: false
          sbom: false

  sonar-analysis:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'
          cache: maven
      - name: SonarQube Scan
        run: |
          chmod +x mvnw
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            SONAR_KEY="TreePruning-Backend"
          else
            SONAR_KEY="TreePruning-Backend-Dev"
          fi
          ./mvnw verify sonar:sonar -DskipTests -Dsonar.projectKey=$SONAR_KEY
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy-dev:
    name: Deploy a Dev
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    steps:
      - name: Disparar actualizacion en infra
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/treepruning-infra
          event-type: update-backend
          client-payload: |
            {
              "service": "backend-dev",
              "sha": "${{ github.sha }}",
              "actor": "${{ github.actor }}"
            }

  generate-openapi:
    name: Generar OpenAPI spec
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    permissions:
      contents: write
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       treepruning
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
        ports:
          - 6379:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Java 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'
          cache: maven
      - name: Generar spec (mvn verify -Pgenerate-docs)
        env:
          POSTGRES_HOST:     localhost
          POSTGRES_PORT:     "5432"
          POSTGRES_DB:       treepruning
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: postgres
          REDIS_HOST:        localhost
          REDIS_PASSWORD:    ""
          REDIS_DATABASE:    "0"
          APP_ENVIRONMENT:   openapi-gen
          SPRING_PROFILES_ACTIVE: openapi-gen
          SQLSERVER_HOST:     localhost
          SQLSERVER_PORT:     "1433"
          SQLSERVER_DB:       dummy
          SQLSERVER_USER:     sa
          SQLSERVER_PASSWORD: dummy_password_openapi
        run: mvn verify -Pgenerate-docs -DskipTests -B -q
      - name: Commitear docs/openapi.json
        run: |
          git config user.email "ci@treepruning.org"
          git config user.name  "CI Bot"
          git add docs/openapi.json
          if git diff --staged --quiet; then
            echo "[SKIP] openapi.json sin cambios, no hay nada que commitear."
          else
            git commit -m "docs: actualizar openapi.json [skip ci]"
            git push
            echo "[OK] openapi.json commiteado."
          fi

  zap-scan:
    name: OWASP ZAP Baseline Scan
    needs: deploy-dev
    runs-on: ubuntu-latest
    steps:
      - name: Preparar archivo de reporte
        run: |
          touch ${{ github.workspace }}/zap-report.html
          chmod 777 ${{ github.workspace }}/zap-report.html
      - name: ZAP Baseline Scan
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t https://api-dev.treepruning.org \
            -r zap-report.html \
            -I
        continue-on-error: true
      - name: Subir reporte ZAP
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report-${{ github.sha }}
          path: ${{ github.workspace }}/zap-report.html

  deploy-prod:
    name: Deploy a Prod
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Disparar actualizacion en infra
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/treepruning-infra
          event-type: update-backend
          client-payload: |
            {
              "service": "backend",
              "sha": "${{ github.sha }}",
              "actor": "${{ github.actor }}"
            }
